name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:


jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: ssd-flash-id_amd64
          - target: aarch64-unknown-linux-gnu
            artifact_name: ssd-flash-id_arm64
          - target: x86_64-unknown-linux-musl
            artifact_name: ssd-flash-id_amd64-musl
          - target: aarch64-unknown-linux-musl
            artifact_name: ssd-flash-id_arm64-musl
    
    steps:
      - name: Debug Context
        run: echo '${{ toJson(github) }}'
      - name: Checkout Current Repo (Metadata)
        uses: actions/checkout@v4
        with:
          #fetch-tags: true
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Fetch Metadata from Tag
        id: get_ref
        run: |
          # 1. 强制重新抓取所有标签对象，确保本地 Git 数据库拥有完整的 Tag 对象（而不是 Commit 指针）
          git fetch --force --tags
          
          # 2. 调试：查看该标签的类型，确认是 'tag' 对象还是 'commit' 对象
          echo "DEBUG: 标签类型是: $(git cat-file -t v0.0.1)"
          
          # 3. 读取内容
          TAG_MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          echo "DEBUG: 标签内容是: [$TAG_MSG]"
          
          # 4. 解析逻辑
          TARGET_REF=$(echo "$TAG_MSG" | grep -oP 'ref: \K[a-zA-Z0-9]+' || echo "")
          
          if [ -z "$TARGET_REF" ]; then
            echo "错误: 未在标签描述中找到 'ref: <sha>'"
            exit 2026
          fi
          
          echo "target_ref=$TARGET_REF" >> $GITHUB_OUTPUT



      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: pseudolabel/ssd-flash-id
          path: external_source
          ref: ${{ steps.parse_tag.outputs.target_ref }}
          fetch-depth: 1

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install Cross
        run: cargo install cross
        
      - name: Compile Release
        working-directory: external_source
        run: cross build --target ${{ matrix.target }} --release
        
      - name: Prepare Artifact
        run: |
          mkdir -p build_output
          mv external_source/target/${{ matrix.target }}/release/ssd-flash-id build_output/${{ matrix.artifact_name }}
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build_output/${{ matrix.artifact_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true 
          
      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*